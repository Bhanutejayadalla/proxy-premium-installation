name: dual_mode_app
description: Proxi Premium - Enhanced Social Connectivity
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State
  provider: ^6.0.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_messaging: ^15.1.0
  firebase_storage: ^12.3.2

  # File Upload (Cloudinary - free alternative to Firebase Storage)
  http: ^1.2.0
  path: ^1.8.0
  crypto: ^3.0.3

  # Local Storage
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0

  # Mesh / Offline
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0
  encrypt: ^5.0.3
  pointycastle: ^3.7.4

  # UI
  google_fonts: ^6.1.0
  lucide_icons: ^0.257.0
  flutter_animate: ^4.2.0
  cached_network_image: ^3.3.0
  intl: ^0.19.0

  # Hardware / Media
  image_picker: ^1.0.4
  permission_handler: ^11.0.0
  flutter_blue_plus: ^1.15.0
  geolocator: ^11.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.2.6

  # Video (Phase 4)
  video_player: ^2.8.0
  video_compress: ^3.1.0
  camera: ^0.10.0
  path_provider: ^2.1.0

  # Music / Audio (Phase 6 — Stories & Posts with Music)
  just_audio: ^0.9.32
  file_picker: ^8.1.0

  # Notifications
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true